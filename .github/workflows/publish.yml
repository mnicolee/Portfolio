on:
  push:
    branches: [main]
  workflow_dispatch:

name: Publish

# Permissions needed for the official GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      # If an executable notebook page is added later, also add here:
      #   - uses: actions/setup-python@v5
      #     with: { python-version: '3.11' }
      #   - run: pip install jupyter
      - name: Render site
        run: quarto render
      - name: Configure Pages (auto-enables Pages on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
